<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポン出しアプリ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* レイアウト用のスタイル調整 */
        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .app-layout {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
            align-items: flex-start;
        }
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: sticky;
            top: 20px;
            height: calc(100vh - 40px);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .main-container {
            flex-grow: 1;
            margin: 0;
            max-width: none;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        /* テンプレートボタンのホバーエフェクト */
        .tpl-btn {
            transition: filter 0.2s;
        }
        .tpl-btn:hover {
            filter: brightness(1.2);
        }
        .tpl-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 左側サイドバー（メモ＆テンプレート） -->
        <aside class="sidebar">
            <h2 style="margin-top: 0; font-size: 1.2em; border-bottom: 1px solid #444; padding-bottom: 10px;">📝 配信の段取りメモ</h2>
            
            <div class="template-controls" style="margin-bottom: 15px; background: #1e1e1e; border-radius: 8px; border: 1px solid #333; overflow: hidden;">
                <div id="template-toggle" style="font-size: 0.8em; color: #aaa; padding: 8px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none;">
                    <span id="template-toggle-icon">▼</span>
                    <span>📑 テンプレート</span>
                </div>
                <div id="template-body" style="padding: 0 10px 10px 10px;">
                    <select id="template-select" style="width: 100%; padding: 6px; margin-bottom: 8px; background: #333; color: white; border: 1px solid #555; border-radius: 4px;">
                        <option value="">-- テンプレートを選択 --</option>
                    </select>
                    <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                        <button id="load-template-btn" class="tpl-btn" style="flex: 1; padding: 6px; cursor: pointer; background: #444; color: white; border: none; border-radius: 4px; font-size: 0.9em;">読込</button>
                        <button id="save-template-btn" class="tpl-btn" style="flex: 1; padding: 6px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; font-size: 0.9em;">新規保存</button>
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <button id="update-template-btn" class="tpl-btn" style="flex: 1; padding: 6px; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 4px; font-size: 0.9em;">上書き</button>
                        <button id="delete-template-btn" class="tpl-btn" style="flex: 1; padding: 6px; cursor: pointer; background: #f44336; color: white; border: none; border-radius: 4px; font-size: 0.9em;">削除</button>
                    </div>
                </div>
            </div>

            <textarea id="memo-area" style="flex-grow: 1; resize: none; width: 100%; padding: 12px; font-family: inherit; font-size: 0.95em; background: #1a1a1a; color: #eee; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; line-height: 1.5; margin-bottom: 15px;" placeholder="ここに配信の流れや段取りを自由にメモできます...&#10;&#10;例：&#10;1. オープニング（BGM 1）&#10;2. 挨拶・本日のテーマ&#10;3. コーナー①（効果音）&#10;..."></textarea>
            
            <!-- データ引き継ぎセクション -->
            <div style="background: #1e1e1e; padding: 8px; border-radius: 8px; border: 1px solid #333;">
                <div style="font-size: 0.8em; color: #aaa; margin-bottom: 5px;">⚙️ データ引き継ぎ・バックアップ</div>
                <div style="display: flex; gap: 5px;">
                    <button id="export-btn" style="padding: 6px 4px; background-color: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; font-size: 0.85em;">
                        書き出し
                    </button>
                    <label style="padding: 6px 4px; background-color: #555; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1; text-align: center; box-sizing: border-box; font-size: 0.85em;">
                        読み込み
                        <input type="file" id="import-file" accept=".json" style="display: none;">
                    </label>
                </div>
            </div>
        </aside>

        <!-- 右側メインコンテンツ（ポン出しアプリ本体） -->
        <div class="main-container">
            <header style="margin-bottom: 30px;">
                <img src="ポン出しアプリタイトル画像New3.png" alt="ポン出しアプリ" style="width: 100%; height: auto; display: block;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px;">
                    <p style="margin: 0;">パソコンに入っている音声ファイルを選択して再生できます。</p>
                    <div style="display: flex; gap: 10px; flex-shrink: 0; margin-left: 20px; align-items: center;">
                        <!-- 一括音量設定 -->
                        <div id="global-volume-ctrl" style="background: #2a2a2a; border: 1px solid #444; border-radius: 8px; padding: 8px 12px; display: flex; flex-direction: column; gap: 4px;">
                            <div style="font-size: 0.75em; color: #aaa; text-align: center; font-weight: bold; margin-bottom: 2px;">🔊 一括音量設定</div>
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span style="font-size: 0.8em; color: #ccc; width: 28px; text-align: right;">音源</span>
                                <input type="range" id="global-vol" min="0" max="1" step="0.01" value="0.75" style="width: 90px; cursor: pointer; accent-color: #4CAF50;">
                                <span id="global-vol-display" style="font-size: 0.8em; color: #aaa; width: 32px; text-align: right; font-variant-numeric: tabular-nums;">75%</span>
                            </div>
                            <div style="display: flex; align-items: center; gap: 6px;">
                                <span style="font-size: 0.8em; color: #ccc; width: 28px; text-align: right;">MC</span>
                                <input type="range" id="global-mc-vol" min="0" max="1" step="0.01" value="0.1" style="width: 90px; cursor: pointer; accent-color: #f39c12;">
                                <span id="global-mc-vol-display" style="font-size: 0.8em; color: #aaa; width: 32px; text-align: right; font-variant-numeric: tabular-nums;">10%</span>
                            </div>
                            <button id="global-vol-apply-btn" style="padding: 5px 8px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; font-weight: bold; margin-top: 2px;">一括設定</button>
                        </div>
                        <button id="add-section-btn" style="padding: 10px 20px; font-size: 1.1em; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s; white-space: nowrap;">
                            + 新しい欄を追加
                        </button>
                        <button id="add-se-section-btn" style="padding: 10px 20px; font-size: 1.1em; background-color: #e91e8c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s; white-space: nowrap;">
                            + 効果音の欄を追加
                        </button>
                    </div>
                </div>
            </header>

            <!-- 欄ナビゲーション（スティッキー） -->
            <div id="section-nav" style="position: sticky; top: 0; z-index: 100; background: #121212; padding: 8px 0 10px 0; margin-bottom: 10px; border-bottom: 1px solid #333; display: flex; flex-wrap: wrap; gap: 6px;"></div>

            <main id="sections-container">
                <!-- JSで動的にセクションが生成されます -->
            </main>

            <!-- リセットボタン（最下部右端） -->
            <div style="display: flex; justify-content: flex-end; margin-top: 40px; padding-top: 20px; border-top: 1px solid #333;">
                <button id="reset-btn" style="padding: 6px 14px; background-color: transparent; color: #555; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 0.75em;">
                    🔄 アプリをデフォルトに戻す
                </button>
            </div>
        </div>
    </div>
    <!-- TOPに戻るボタン -->
    <button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" style="position: fixed; bottom: 40px; right: 24px; z-index: 200; width: 48px; height: 48px; border-radius: 50%; background: #2a2a2a; color: #e0e0e0; border: 1px solid #555; cursor: pointer; font-size: 1.2em; box-shadow: 0 2px 8px rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center;" title="TOPに戻る">↑</button>

    <script src="script.js"></script>
    <script>
        const backToTopBtn = document.getElementById('back-to-top');
        window.addEventListener('scroll', () => {
            backToTopBtn.style.display = window.scrollY > 300 ? 'flex' : 'none';
        });
    </script>
</body>
</html>
